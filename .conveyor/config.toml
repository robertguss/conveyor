version = 1
project_key = "conveyor"
default_toolchain_profile = "beam"
default_policy_profile = "implement"
default_code_quality_profile = "elixir"
run_spec_lock_behavior = "reject_overrides"

[artifact_projection]
root = "tmp/conveyor_artifacts"
manifest = "manifest.json"
include_redacted_findings = true

[sample_repository]
name = "fastapi_tasks"
root = "sample_apps/fastapi_tasks"
plan_fixture = "sample_apps/fastapi_tasks/plans/valid_plan.json"
default_code_quality_profile = "sample_noop"
local_advisory_code_quality_profile = "sample_local_python"
quality_ref_consumers = ["context_pack", "gate"]

[toolchain.profiles.beam]
runtime = "elixir"
otp = "27 or 28"
image = "hexpm/elixir:1.17.3-erlang-27.3.4-debian-bookworm-20250203-slim"

[toolchain.profiles.python]
runtime = "python"
version = "3.12"
image = "python:3.12-slim"

[policy.profiles.explore]
autonomy_level = "L1"
network = "disabled"
denylist_fixture = "docs/fixtures/policy/denylist_cases.json"

[policy.profiles.implement]
autonomy_level = "L1"
network = "disabled"
denylist_fixture = "docs/fixtures/policy/denylist_cases.json"

[policy.profiles.verify]
autonomy_level = "L1"
network = "disabled"
denylist_fixture = "docs/fixtures/policy/denylist_cases.json"

[policy.profiles.release]
autonomy_level = "L1"
network = "disabled"
denylist_fixture = "docs/fixtures/policy/denylist_cases.json"

[policy.profiles.maintenance]
autonomy_level = "L1"
network = "disabled"
denylist_fixture = "docs/fixtures/policy/denylist_cases.json"

[code_quality.profiles.elixir]
adapter = "mix"
checks = ["format", "test"]

[code_quality.profiles.python]
adapter = "python"
checks = ["py_compile", "plan_audit"]

[code_quality.profiles.sample_noop]
adapter = "noop"
mode = "advisory"
blocking = false
checks = ["quality_ref"]
required_tools = []
required_env_keys = []
consumers = ["context_pack", "gate"]

[code_quality.profiles.sample_local_python]
adapter = "local_python"
mode = "advisory"
blocking = false
checks = ["py_compile", "pytest_collect"]
required_tools = ["python3"]
required_env_keys = []
consumers = ["context_pack", "gate"]

[code_quality.profiles.codescent]
adapter = "codescent"
mode = "blocking"
blocking = true
checks = ["codescent_gate"]
required_tools = ["codescent"]
required_env_keys = ["CODESCENT_API_KEY"]
consumers = ["gate"]

[commands.plan_audit]
executable = "python3"
argv = ["sample_apps/fastapi_tasks/scripts/plan_audit.py", "sample_apps/fastapi_tasks/plans/complete_tasks.md"]
cwd = "."
timeout_ms = 30000
env_keys = []
read_roots = ["sample_apps/fastapi_tasks", "docs/schemas"]
write_roots = ["tmp/conveyor_artifacts"]
network = "disabled"
toolchain_profile = "python"
policy_profile = "implement"
code_quality_profile = "python"
artifact_path = "tmp/conveyor_artifacts/plan_audit.json"
consumers = ["plan_audit"]

[commands.agents_md]
executable = "python3"
argv = ["scripts/agents_md_contract.py", "--self-test", "--output", "tmp/agents_md_contract/agents_md_generation.json", "--generated-output", "tmp/agents_md_contract/generated_AGENTS.md"]
cwd = "."
timeout_ms = 30000
env_keys = []
read_roots = ["AGENTS.md", "README.md", "TASK_SCHEMA.md", "SAFETY_POLICY.md", ".conveyor/config.toml", "docs/policy/profiles.json"]
write_roots = ["tmp/agents_md_contract"]
network = "disabled"
toolchain_profile = "python"
policy_profile = "implement"
code_quality_profile = "python"
artifact_path = "tmp/agents_md_contract/agents_md_generation.json"
consumers = ["agents_md"]

[commands.policy]
executable = "python3"
argv = ["scripts/check_policy_profiles.py"]
cwd = "."
timeout_ms = 30000
env_keys = []
read_roots = ["docs/policy", "docs/fixtures/policy", "SAFETY_POLICY.md"]
write_roots = ["tmp/conveyor_artifacts"]
network = "disabled"
toolchain_profile = "python"
policy_profile = "implement"
code_quality_profile = "python"
artifact_path = "tmp/conveyor_artifacts/policy_profiles.json"
consumers = ["policy"]

[commands.verify]
executable = "mix"
argv = ["test"]
cwd = "."
timeout_ms = 120000
env_keys = ["CONVEYOR_SESSION_SIGNING_SALT", "PHX_SECRET_KEY_BASE", "PHX_LIVE_VIEW_SIGNING_SALT"]
read_roots = ["config", "lib", "test", "priv", "mix.exs", "mix.lock"]
write_roots = ["tmp/conveyor_artifacts"]
network = "disabled"
toolchain_profile = "beam"
policy_profile = "implement"
code_quality_profile = "elixir"
artifact_path = "tmp/conveyor_artifacts/mix_test.json"
consumers = ["verification"]
